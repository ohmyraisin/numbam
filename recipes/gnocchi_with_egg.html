<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>계란 뇨끼 | 아기 이유식 레시피북</title>
  <meta name="description" content="계란 뇨끼 이유식 레시피입니다.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
  <div class="page-bg" aria-hidden="true"></div>

  <main class="recipe-main">
    <header class="recipe-head reveal">
      <a class="btn" href="../index.html">목록으로 돌아가기</a>
      <h1>계란 뇨끼</h1>
      <p>먼저 텍스트 레시피를 읽고, 마지막에 영상/블로그/이미지를 확인하세요.</p>
      <p class="tag-list recipe-tags" aria-label="태그">
        <span class="tag-chip">#감자</span>
        <span class="tag-chip">#계란</span>
        <span class="tag-chip">#뇨끼</span>
        <span class="tag-chip">#치즈</span>
      </p>
    </header>

    <section class="card recipe-text reveal">
      <h2>재료</h2>
      <ul>
        <li>감자 1~2개</li>
        <li>쌀가루 50g</li>
        <li>계란노른자 1개</li>
      </ul>

      <h2>조리과정</h2>
      <ol>
        <li>삶은 감자를 준비한다.</li>
        <li>매셔로 으깨기</li>
        <li>쌀가루와 치즈넣고 반죽하기</li>
        <li>계란 넣어서 나머지 반죽하기</li>
        <li>모양빚기 (포크사용)</li>
        <li>물에 삶기</li>
      </ol>
    </section>

    <section class="card video-wrap reveal" aria-label="블로그 링크">
      <h2>블로그 링크</h2>
      <a href="https://m.blog.naver.com/miyollmiyo1/224236490969" target="_blank" rel="noopener noreferrer" class="btn">블로그에서 보기</a>
    </section>
  </main>

  <script>
    const observer = new IntersectionObserver((entries) => {
      for (const entry of entries) {
        if (entry.isIntersecting) {
          entry.target.classList.add('show');
          observer.unobserve(entry.target);
        }
      }
    }, { threshold: 0.15 });

    document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));
  </script>
</body>
</html>
