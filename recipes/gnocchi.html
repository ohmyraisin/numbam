<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>노계란 뇨끼 | 아기 이유식 레시피북</title>
  <meta name="description" content="노계란 뇨끼 이유식 레시피입니다.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
  <div class="page-bg" aria-hidden="true"></div>

  <main class="recipe-main">
    <header class="recipe-head reveal">
      <a class="btn" href="../index.html">목록으로 돌아가기</a>
      <h1>노계란 뇨끼</h1>
      <p>먼저 텍스트 레시피를 읽고, 마지막에 영상/블로그/이미지를 확인하세요.</p>
      <p class="tag-list recipe-tags" aria-label="태그">
        <span class="tag-chip">#감자</span>
        <span class="tag-chip">#노계란</span>
        <span class="tag-chip">#뇨끼</span>
      </p>
    </header>

    <section class="card recipe-text reveal">
      <h2>재료</h2>
      <ul>
        <li>감자</li>
        <li>전분(감자전분, 쌀가루)</li>
        <li>소금</li>
        <li>올리브오일</li>
        <li>파마산치즈 파우더</li>
      </ul>

      <h2>조리과정</h2>
      <ol>
        <li>삶은 감자를 준비한다.</li>
        <li>매셔로 으깨고 전분을 넣어 반죽을 만든다.</li>
      </ol>
    </section>

    <section class="card media-wrap reveal" aria-label="참고 이미지">
      <h2>이미지</h2>
      <div class="media-grid">
        <img src="../assets/images/노계란뇨끼2.jpeg" alt="반죽 전 뇨끼 재료 이미지" loading="lazy" decoding="async">
        <img src="../assets/images/노계란뇨끼1.jpeg" alt="노계란 뇨끼 완성 이미지" loading="lazy" decoding="async">
      </div>
    </section>
  </main>

  <script>
    const observer = new IntersectionObserver((entries) => {
      for (const entry of entries) {
        if (entry.isIntersecting) {
          entry.target.classList.add('show');
          observer.unobserve(entry.target);
        }
      }
    }, { threshold: 0.15 });

    document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));
  </script>
</body>
</html>
