<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>공지사항 리스트 샘플</title>
  <style>
    :root {
      --bg: #f7f3ec;
      --paper: #fffdf9;
      --line: #ded6c9;
      --text: #2f2a24;
      --muted: #6a6258;
      --accent: #a67c52;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Apple SD Gothic Neo", "Hiragino Sans", "Noto Sans KR", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 8%, #fff6ea 0%, transparent 36%),
        radial-gradient(circle at 90% 92%, #f1e8dc 0%, transparent 28%),
        var(--bg);
      line-height: 1.72;
    }

    .wrap {
      width: min(900px, 92vw);
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    .card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(108, 90, 66, 0.08);
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(1.24rem, 3.8vw, 1.8rem);
      letter-spacing: -0.02em;
    }

    .sub {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 14px;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 1.08rem;
      color: #6a4d30;
    }

    .notice-list {
      margin: 0;
      padding-left: 20px;
      display: grid;
      gap: 8px;
    }

    .notice-list li {
      color: #4f4438;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card" aria-label="공지사항 샘플">
      <h1>공지사항 영역 샘플</h1>
      <p class="sub">h2 아래 p 문장을 리스트(ul/li)로 전환한 예시입니다.</p>

      <h2>공지사항</h2>
      <ul class="notice-list">
        <li>레시피는 상단 텍스트(재료, 조리과정)를 먼저 읽고 하단 영상을 확인해 주세요.</li>
        <li>레시피 정보는 수시로 업데이트될 수 있으니 조리 전 최신 내용을 다시 확인해 주세요.</li>
        <li>재료 수급 상황에 따라 일부 재료나 분량이 변경될 수 있습니다.</li>
        <li>새 레시피는 순차적으로 추가되며, 목록에서 바로 확인할 수 있습니다.</li>
        <li>문의나 수정 요청은 공유된 채널을 통해 전달해 주세요.</li>
      </ul>
    </section>
  </main>
</body>
</html>
