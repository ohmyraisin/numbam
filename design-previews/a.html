<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>시안 A - Washi Light</title>
  <style>
    :root {
      --bg: #f7f3ec;
      --paper: #fffdf9;
      --text: #2f2a24;
      --muted: #6a6258;
      --line: #ded6c9;
      --accent: #a67c52;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Apple SD Gothic Neo", "Hiragino Sans", "Noto Sans KR", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 8%, #fff6ea 0%, transparent 36%),
        radial-gradient(circle at 90% 92%, #f1e8dc 0%, transparent 28%),
        var(--bg);
      line-height: 1.7;
    }

    .container {
      width: min(980px, 92vw);
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    .hero {
      background: linear-gradient(180deg, #fffaf2 0%, #f8f2e9 100%);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 8px 24px rgba(108, 90, 66, 0.08);
    }

    .kicker {
      margin: 0 0 10px;
      color: var(--accent);
      letter-spacing: 0.1em;
      font-size: 12px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.6rem, 4.8vw, 2.3rem);
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .hero p {
      margin: 10px 0 0;
      color: var(--muted);
    }

    .grid {
      margin-top: 18px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 1.08rem;
    }

    ul, ol {
      margin: 10px 0;
      padding-left: 20px;
    }

    .btn {
      display: inline-block;
      margin-top: 8px;
      text-decoration: none;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 9px 13px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 14px;
    }

    .meta {
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (min-width: 820px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="hero">
      <p class="kicker">WASHI LIGHT</p>
      <h1>미니멀한 일본 가정식 레시피북</h1>
      <p>밝은 화지 톤을 기반으로 가독성 중심으로 구성한 시안입니다.</p>
    </section>

    <section class="grid">
      <article class="card">
        <h2>레시피 카드 예시</h2>
        <p><strong>파프리카 물김치</strong></p>
        <p>재료와 과정을 먼저 읽고, 하단 영상으로 순서를 확인합니다.</p>
        <a class="btn" href="#">상세 보기</a>
      </article>

      <article class="card">
        <h2>상세 페이지 블록 예시</h2>
        <p><strong>재료</strong></p>
        <ul>
          <li>흰밥 6숟가락</li>
          <li>알배추 3-4개</li>
          <li>파프리카 빨강 1개</li>
        </ul>
        <p><strong>조리과정</strong></p>
        <ol>
          <li>채소를 손질합니다.</li>
          <li>소금에 1시간 절입니다.</li>
          <li>양념장을 만들어 버무립니다.</li>
        </ol>
      </article>
    </section>

    <p class="meta">모바일 우선, 저채도 내추럴 팔레트, 작은 라운드와 얕은 그림자를 사용했습니다.</p>
  </main>
</body>
</html>
